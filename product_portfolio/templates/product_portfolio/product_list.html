{% extends "object_list_base.html" %}
{% load i18n %}

{% block top-right-buttons %}
  <div class="btn-group">
    <span class="d-inline-block" tabindex="0" data-bs-toggle="tooltip">
      <button id="compare_button" data-href="/products/compare/" class="btn btn-outline-dark disabled"><i class="fa-solid fa-code-compare"></i> {% trans "Compare" %}</button>
    </span>
  </div>
  {{ block.super }}
{% endblock %}

{% block javascripts %}
    {{ block.super }}
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const compareButton = document.getElementById('compare_button');
        const compareButtonWrapper = compareButton.parentElement;

        function handleCompareButtonDisplay() {
            const count = document.querySelectorAll('tbody input[type="checkbox"]:checked').length;
            if (count === 2) {
                compareButton.classList.remove('disabled');
                compareButtonWrapper.setAttribute('data-bs-original-title', '');
            } else {
                compareButton.classList.add('disabled');
                compareButtonWrapper.setAttribute('data-bs-original-title', 'Select first two products to compare, then click this button');
            }
        }

        document.querySelectorAll('tbody input[type="checkbox"]').forEach(function (checkbox) {
            checkbox.addEventListener('click', handleCompareButtonDisplay);
        });

        document.querySelectorAll('.select-all').forEach(function (selectAll) {
            selectAll.addEventListener('click', handleCompareButtonDisplay);
        });

        // Runs on load to support the "back" button of the browser
        handleCompareButtonDisplay();

        compareButton.addEventListener('click', function (event) {
            event.preventDefault();
            const checked = document.querySelectorAll('tbody input[type="checkbox"]:checked');
            if (checked.length === 2) {
                let left = checked[0];
                let right = checked[1];

                // Swap variables to display oldest on the left
                if (String(left.dataset.version) > String(right.dataset.version)) {
                    [left, right] = [right, left];
                }

                const currentHref = compareButton.getAttribute('data-href');
                const parameters = left.value + '/' + right.value + '/';
                window.location.href = currentHref + parameters;
            }
        });
    });
    </script>
{% endblock %}
