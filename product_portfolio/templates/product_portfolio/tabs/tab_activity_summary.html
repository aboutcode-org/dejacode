<div class="row g-3 mb-4">

  <div class="col-6 col-md-4">
    <div class="bg-body-secondary rounded-3 p-3 cursor-pointer" role="button" data-scroll-to="activity-imports">
      <div class="small text-body-secondary mb-1">Imports</div>
      <div class="fs-4 fw-medium lh-sm {% if has_projects_in_progress %}text-primary{% endif %}">{{ scancode_projects|length }}</div>
    </div>
  </div>

  <div class="col-6 col-md-4">
    <div class="bg-body-secondary rounded-3 p-3 cursor-pointer" role="button" data-scroll-to="activity-requests">
      <div class="small text-body-secondary mb-1">Requests</div>
      <div class="fs-4 fw-medium lh-sm">{{ requests|length }}</div>
    </div>
  </div>

  <div class="col-12 col-md-4">
    <div class="bg-body-secondary rounded-3 p-3 cursor-pointer" role="button" data-scroll-to="activity-history">
      <div class="small text-body-secondary mb-1">History entries</div>
      <div class="fs-4 fw-medium lh-sm">{{ history_entries|length }}</div>
    </div>
  </div>

</div>
