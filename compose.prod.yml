name: dejacode

x-description: "Production overrides — build from source, external nginx config"

services:
  web:
    build: .
    image: dejacode:prod

  worker:
    build: .
    image: dejacode:prod

  scheduler:
    build: .
    image: dejacode:prod

  nginx:
    configs: []
    volumes:
      - ./etc/nginx/conf.d/:/etc/nginx/conf.d/
